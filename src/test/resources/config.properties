# Test Configuration Properties
# This file can be used to externalize configuration for the test framework

# Browser Configuration
# Supported values: chrome, firefox, edge
browser=chrome

# Website Configuration
base.url=https://practicesoftwaretesting.com

# Timeout Configuration (in seconds)
implicit.wait.timeout=10
explicit.wait.timeout=10
page.load.timeout=10

# Test Data
search.product=Hammer

# Environment Configuration
# Supported values: production, staging, development
environment=production

# Logging Configuration
# Supported values: DEBUG, INFO, WARN, ERROR
log.level=INFO

